<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OccMed Pods">
<title>OccMed Podcasts</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #161a22;
  --surface2: #1e2330;
  --border: #2a3040;
  --accent: #4fc3a1;
  --accent2: #7b9cff;
  --text: #e8eaf0;
  --text-muted: #7a8499;
  --text-dim: #4a5268;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
header {
  padding: 52px 20px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  background: linear-gradient(180deg, var(--bg) 80%, transparent);
}
.brand { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
.brand h1 { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); }
.brand .tag {
  font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent);
  background: rgba(79,195,161,0.1); border: 1px solid rgba(79,195,161,0.25);
  padding: 2px 7px; border-radius: 20px; letter-spacing: 0.8px; text-transform: uppercase;
}
.search-wrap { position: relative; margin-bottom: 4px; }
.search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.4; }
#searchInput {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px 10px 38px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s;
}
#searchInput::placeholder { color: var(--text-dim); }
#searchInput:focus { border-color: var(--accent); }
.tabs { display: flex; gap: 6px; padding: 12px 20px; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border); background: transparent;
  color: var(--text-muted); transition: all 0.2s; font-family: 'DM Sans', sans-serif;
}
.tab.active { background: var(--accent); border-color: var(--accent); color: #0d0f14; font-weight: 600; }

#connectScreen { padding: 40px 20px; }
.connect-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 32px 24px; max-width: 420px; margin: 0 auto;
}
.connect-icon {
  width: 56px; height: 56px; background: rgba(79,195,161,0.1); border-radius: 50%;
  display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 24px;
}
.connect-card h2 { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 8px; text-align:center; }
.connect-card > p { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 20px; text-align:center; }
.input-group { margin-bottom: 12px; }
.input-group label {
  font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text-muted);
  display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
}
.input-group input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px; color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 12px; outline: none; transition: border-color 0.2s;
}
.input-group input:focus { border-color: var(--accent); }
.input-group input::placeholder { color: var(--text-dim); }
.btn-primary {
  width: 100%; background: var(--accent); color: #0d0f14; border: none;
  border-radius: 10px; padding: 12px; font-family: 'DM Sans', sans-serif;
  font-weight: 600; font-size: 14px; cursor: pointer; transition: opacity 0.2s; margin-top: 4px;
}
.btn-primary:hover { opacity: 0.85; }

#mainContent { display: none; }
.section-header { padding: 0 20px 10px; display: flex; align-items: center; justify-content: space-between; }
.section-title { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
.episode-count { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); }
.category-label { padding: 10px 20px 6px; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--accent2); letter-spacing: 0.5px; text-transform: uppercase; opacity: 0.8; }
.episode-card {
  margin: 0 12px 6px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 14px;
  cursor: pointer; transition: all 0.18s; position: relative; overflow: hidden;
}
.episode-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--accent); opacity: 0; transition: opacity 0.2s;
}
.episode-card:hover { border-color: rgba(79,195,161,0.35); background: var(--surface2); }
.episode-card:hover::before { opacity: 1; }
.episode-card.playing { border-color: rgba(79,195,161,0.5); background: rgba(79,195,161,0.05); }
.episode-card.playing::before { opacity: 1; }
.ep-icon {
  width: 42px; height: 42px; border-radius: 10px; background: var(--surface2);
  border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 18px;
}
.ep-info { flex: 1; min-width: 0; }
.ep-title { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.ep-meta { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
.ep-progress { width: 100%; height: 2px; background: var(--border); border-radius: 1px; margin-top: 6px; overflow: hidden; }
.ep-progress-fill { height: 100%; background: var(--accent); border-radius: 1px; }
.ep-play-btn {
  width: 32px; height: 32px; border-radius: 50%; background: rgba(79,195,161,0.1);
  border: 1px solid rgba(79,195,161,0.25); display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; transition: all 0.2s;
}
.episode-card:hover .ep-play-btn, .episode-card.playing .ep-play-btn { background: var(--accent); border-color: var(--accent); }

#player {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(22,26,34,0.97); backdrop-filter: blur(20px);
  border-top: 1px solid var(--border); padding: 12px 20px 36px; z-index: 200;
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
#player.visible { transform: translateY(0); }
.player-now { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.player-icon { width: 38px; height: 38px; border-radius: 8px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.player-info { flex: 1; min-width: 0; }
.player-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-cat { font-size: 10px; color: var(--accent); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; }
.progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.time-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); width: 36px; }
.time-label.right { text-align: right; }
#progressBar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; cursor: pointer; position: relative; }
#progressFill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; pointer-events: none; }
.controls { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.ctrl-btn {
  background: none; border: none; color: var(--text-muted); cursor: pointer;
  padding: 6px; border-radius: 8px; transition: all 0.15s;
  font-family: 'DM Mono', monospace; font-size: 11px; display: flex; align-items: center; gap: 4px;
}
.ctrl-btn:hover { color: var(--text); background: var(--surface2); }
#speedBtn { color: var(--accent); border: 1px solid rgba(79,195,161,0.3); padding: 4px 10px; border-radius: 20px; font-size: 11px; }
.play-pause-btn {
  width: 48px; height: 48px; border-radius: 50%; background: var(--accent); border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: opacity 0.2s; flex-shrink: 0;
}
.play-pause-btn:hover { opacity: 0.85; }

.auth-bar {
  margin: 0 12px 12px; display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px;
}
.auth-bar span { font-size: 12px; color: var(--text-muted); }
.auth-bar button { font-size: 11px; color: var(--accent); background: none; border: none; cursor: pointer; font-family: 'DM Mono', monospace; }
.pulse { display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; margin-right: 6px; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

.loading { padding: 60px 20px; text-align: center; color: var(--text-muted); font-size: 13px; }
.spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { padding: 60px 20px; text-align: center; color: var(--text-muted); font-size: 13px; }
.episode-list-wrap { padding-bottom: 180px; }
.scroll-area { overflow-y: auto; max-height: calc(100vh - 160px); }

.loading-ep {
  position: fixed; bottom: 160px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--border); border-radius: 20px;
  padding: 8px 16px; font-size: 12px; color: var(--text-muted);
  font-family: 'DM Mono', monospace; z-index: 300; display: none;
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>OccMed Podcasts</h1>
    <span class="tag">Private</span>
  </div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7a8499" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Search episodes..." oninput="filterEpisodes(this.value)">
  </div>
</header>

<div class="tabs" id="tabBar">
  <button class="tab active" onclick="filterByCategory('all',this)">All</button>
</div>

<div id="connectScreen">
  <div class="connect-card">
    <div class="connect-icon">🎙️</div>
    <h2>Connect Google Drive</h2>
    <p>Paste your Google OAuth Client ID and the ID of your top-level podcast folder.</p>
    <div class="input-group">
      <label>Google Client ID</label>
      <input type="text" id="clientIdInput" placeholder="xxxx.apps.googleusercontent.com">
    </div>
    <div class="input-group">
      <label>Podcast Folder ID</label>
      <input type="text" id="folderIdInput" placeholder="Paste the folder ID from the Drive URL">
    </div>
    <button class="btn-primary" onclick="saveAndConnect()">Connect &amp; Sign In</button>
  </div>
</div>

<div id="mainContent">
  <div class="auth-bar" id="authBar" style="display:none">
    <span><span class="pulse"></span>Connected to Google Drive</span>
    <button onclick="signOut()">Sign out</button>
  </div>
  <div class="section-header">
    <span class="section-title" id="sectionTitle">All Episodes</span>
    <span class="episode-count" id="epCount"></span>
  </div>
  <div class="scroll-area">
    <div class="episode-list-wrap" id="episodeList">
      <div class="loading"><div class="spinner"></div>Loading episodes...</div>
    </div>
  </div>
</div>

<div id="player">
  <div class="player-now">
    <div class="player-icon" id="playerIcon">🎙️</div>
    <div class="player-info">
      <div class="player-title" id="playerTitle">Nothing playing yet</div>
      <div class="player-cat" id="playerCat"></div>
    </div>
  </div>
  <div class="progress-row">
    <span class="time-label" id="timeEl">0:00</span>
    <div id="progressBar" onclick="seekTo(event)">
      <div id="progressFill"></div>
    </div>
    <span class="time-label right" id="durationEl">--:--</span>
  </div>
  <div class="controls">
    <button class="ctrl-btn" onclick="skipBack()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      15s
    </button>
    <button class="play-pause-btn" id="playPauseBtn" onclick="togglePlay()">
      <svg id="playIconSvg" width="20" height="20" viewBox="0 0 24 24" fill="#0d0f14"><polygon id="playIconPath" points="8,5 19,12 8,19"/></svg>
    </button>
    <button class="ctrl-btn" onclick="skipForward()">
      30s
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/></svg>
    </button>
    <button class="ctrl-btn" id="speedBtn" onclick="cycleSpeed()">1.0×</button>
  </div>
</div>

<div class="loading-ep" id="loadingEp">⏳ Fetching audio...</div>

<audio id="audioEl"></audio>

<script>
// ── GLOBALS ──────────────────────────────────────────────
const audio = document.getElementById('audioEl');
let episodes = [], filtered = [], currentEp = null;
let activeCategory = 'all';
const speeds = [0.75, 1.0, 1.25, 1.5, 1.75, 2.0];
let speedIdx = 1;
let episode_map = {};
let gapiReady = false;
let accessToken = null;
let currentBlobUrl = null;

// ── HANDLE OAUTH REDIRECT RETURN (runs before anything else) ──
(function() {
  const hash = window.location.hash;
  if (hash && hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    const token = params.get('access_token');
    const fid = params.get('state');
    if (token) {
      accessToken = token;
      if (fid) localStorage.setItem('gFid', fid);
      // Clean the token out of the URL bar
      history.replaceState(null, '', window.location.pathname);
    }
  }
})();

// ── PERSISTENCE ──────────────────────────────────────────
function getProgress(id) { return parseFloat(localStorage.getItem('p_'+id)||'0'); }
function setProgress(id,v) { localStorage.setItem('p_'+id, v); }
function saveSession() {
  localStorage.setItem('session', JSON.stringify({
    lastId: currentEp ? currentEp.id : null,
    lastPos: audio.currentTime || 0,
    speedIdx
  }));
}

// ── CONNECT ──────────────────────────────────────────────
function saveAndConnect() {
  const cid = document.getElementById('clientIdInput').value.trim();
  const fid = document.getElementById('folderIdInput').value.trim();
  if (!cid || !fid) { alert('Please enter both your Client ID and Folder ID.'); return; }
  localStorage.setItem('gCid', cid);
  localStorage.setItem('gFid', fid);
  doAuth(cid, fid);
}

// ── REDIRECT-BASED AUTH (works on iPhone home screen) ────
function doAuth(cid, fid) {
  const params = new URLSearchParams({
    client_id: cid,
    redirect_uri: 'https://allisondepas23-ctrl.github.io/occmed-podcasts',
    response_type: 'token',
    scope: 'https://www.googleapis.com/auth/drive.readonly',
    include_granted_scopes: 'true',
    state: fid
  });
  window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}

function signOut() {
  accessToken = null;
  episodes = []; filtered = [];
  if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }
  audio.src = '';
  localStorage.removeItem('gCid');
  localStorage.removeItem('gFid');
  showConnect();
}

// ── LOAD GAPI CLIENT ─────────────────────────────────────
function loadGapiAndFetch(fid) {
  if (window.gapi && gapiReady) { fetchFiles(fid); return; }
  const s = document.createElement('script');
  s.src = 'https://apis.google.com/js/api.js';
  s.onload = () => {
    gapi.load('client', async () => {
      await gapi.client.load('https://www.googleapis.com/discovery/v1/apis/drive/v3/rest');
      gapi.client.setToken({ access_token: accessToken });
      gapiReady = true;
      fetchFiles(fid);
    });
  };
  document.head.appendChild(s);
}

// ── DRIVE ────────────────────────────────────────────────
async function fetchFiles(rootId) {
  showLoading();
  try {
    const folderRes = await gapi.client.drive.files.list({
      q: `'${rootId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`,
      fields: 'files(id,name)', pageSize: 50
    });
    const folders = folderRes.result.files || [];
    folders.push({ id: rootId, name: '_root' });

    let all = [];
    for (const folder of folders) {
      const res = await gapi.client.drive.files.list({
        q: `'${folder.id}' in parents and (mimeType contains 'audio/' or name contains '.wav' or name contains '.mp3' or name contains '.m4a' or name contains '.ogg') and trashed=false`,
        fields: 'files(id,name,mimeType)', pageSize: 200, orderBy: 'name'
      });
      (res.result.files || []).forEach(f => {
        all.push({
          id: f.id,
          title: f.name.replace(/\.[^/.]+$/, ''),
          category: folder.name === '_root' ? 'General' : folder.name,
          icon: catIcon(folder.name),
          mimeType: f.mimeType || 'audio/wav'
        });
      });
    }

    episodes = all;
    filtered = [...episodes];
    buildTabs();
    renderEpisodes(filtered);
    document.getElementById('authBar').style.display = 'flex';

    try {
      const s = JSON.parse(localStorage.getItem('session')||'{}');
      if (s.speedIdx != null) { speedIdx = s.speedIdx; audio.playbackRate = speeds[speedIdx]; updateSpeedBtn(); }
    } catch(e) {}
  } catch(e) {
    document.getElementById('episodeList').innerHTML = `<div class="empty">Error loading files: ${e.message}</div>`;
  }
}

// ── AUDIO FETCH ───────────────────────────────────────────
async function fetchAudioAsBlob(fileId, mimeType) {
  const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`;
  const resp = await fetch(url, {
    headers: { 'Authorization': 'Bearer ' + accessToken }
  });
  if (!resp.ok) throw new Error('Failed to fetch audio: ' + resp.status);
  const blob = await resp.blob();
  const typedBlob = new Blob([blob], { type: mimeType.includes('wav') || mimeType === 'application/octet-stream' ? 'audio/wav' : mimeType });
  return URL.createObjectURL(typedBlob);
}

// ── HELPERS ──────────────────────────────────────────────
function catIcon(n) {
  n = (n||'').toLowerCase();
  if (n.includes('pulm')||n.includes('lung')||n.includes('resp')) return '🫁';
  if (n.includes('musc')||n.includes('ortho')||n.includes('spine')) return '🦴';
  if (n.includes('comp')||n.includes('legal')||n.includes('worker')) return '⚖️';
  if (n.includes('reg')||n.includes('osha')||n.includes('law')) return '📋';
  if (n.includes('neuro')) return '🧠';
  if (n.includes('derm')||n.includes('skin')) return '🩹';
  if (n.includes('audio')||n.includes('hear')) return '👂';
  if (n.includes('tox')||n.includes('chem')) return '⚗️';
  if (n.includes('card')||n.includes('heart')) return '❤️';
  return '🎙️';
}

function showConnect() { document.getElementById('connectScreen').style.display='block'; document.getElementById('mainContent').style.display='none'; }
function showMain() { document.getElementById('connectScreen').style.display='none'; document.getElementById('mainContent').style.display='block'; }
function showLoading() { document.getElementById('episodeList').innerHTML='<div class="loading"><div class="spinner"></div>Loading from Drive...</div>'; }

function buildTabs() {
  const cats = [...new Set(episodes.map(e=>e.category))];
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '<button class="tab active" onclick="filterByCategory(\'all\',this)">All</button>';
  cats.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'tab';
    btn.textContent = c;
    btn.onclick = function(){ filterByCategory(c,this); };
    bar.appendChild(btn);
  });
}

function filterByCategory(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  applyFilters(document.getElementById('searchInput').value.toLowerCase(), cat);
}

function filterEpisodes(q) { applyFilters(q.toLowerCase(), activeCategory); }

function applyFilters(q, cat) {
  filtered = episodes.filter(ep => {
    const mc = cat==='all'||ep.category===cat;
    const mq = !q||ep.title.toLowerCase().includes(q)||ep.category.toLowerCase().includes(q);
    return mc&&mq;
  });
  renderEpisodes(filtered);
}

function renderEpisodes(eps) {
  episode_map = {};
  eps.forEach(e=>episode_map[e.id]=e);
  document.getElementById('epCount').textContent = eps.length+' episodes';
  document.getElementById('sectionTitle').textContent = activeCategory==='all'?'All Episodes':activeCategory;

  if (!eps.length) { document.getElementById('episodeList').innerHTML='<div class="empty">No episodes found.</div>'; return; }

  const groups = {};
  eps.forEach(ep=>{ if(!groups[ep.category])groups[ep.category]=[]; groups[ep.category].push(ep); });

  let html = '';
  Object.entries(groups).forEach(([cat,catEps])=>{
    if(activeCategory==='all') html+=`<div class="category-label">${cat}</div>`;
    catEps.forEach(ep=>{
      const prog = getProgress(ep.id);
      const pct = prog>0?Math.min(prog*100,100):0;
      const isPlaying = currentEp&&currentEp.id===ep.id;
      const playPath = (isPlaying&&!audio.paused)?'M6 19h4V5H6v14zm8-14v14h4V5h-4z':'M8 5v14l11-7z';
      html+=`<div class="episode-card ${isPlaying?'playing':''}" id="card_${ep.id}" onclick="loadEpisode(episode_map['${ep.id}'],true)">
        <div class="ep-icon">${ep.icon||'🎙️'}</div>
        <div class="ep-info">
          <div class="ep-title">${ep.title}</div>
          <div class="ep-meta">${ep.category}</div>
          <div class="ep-progress"><div class="ep-progress-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="ep-play-btn"><svg width="12" height="12" viewBox="0 0 24 24"><path fill="#7a8499" d="${playPath}"/></svg></div>
      </div>`;
    });
  });
  document.getElementById('episodeList').innerHTML = html;
}

// ── PLAYER ───────────────────────────────────────────────
async function loadEpisode(ep, autoplay) {
  if (!accessToken) return;
  if (currentEp) setProgress(currentEp.id, audio.duration>0?audio.currentTime/audio.duration:0);

  currentEp = ep;
  document.getElementById('playerTitle').textContent = ep.title;
  document.getElementById('playerCat').textContent = ep.category;
  document.getElementById('playerIcon').textContent = ep.icon||'🎙️';
  document.getElementById('player').classList.add('visible');
  document.getElementById('loadingEp').style.display = 'block';

  if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }
  audio.src = '';

  try {
    const blobUrl = await fetchAudioAsBlob(ep.id, ep.mimeType || 'audio/wav');
    currentBlobUrl = blobUrl;

    const saved = getProgress(ep.id);
    audio.src = blobUrl;
    audio.playbackRate = speeds[speedIdx];

    if (saved > 0 && saved < 0.99) {
      audio.addEventListener('loadedmetadata', () => {
        audio.currentTime = saved * audio.duration;
      }, { once: true });
    }

    document.getElementById('loadingEp').style.display = 'none';
    if (autoplay) audio.play().catch(e => console.warn('Autoplay blocked:', e));
  } catch(e) {
    document.getElementById('loadingEp').style.display = 'none';
    alert('Could not load audio: ' + e.message);
  }

  updatePlayIcon();
  renderEpisodes(filtered);
}

function togglePlay() {
  if (!currentEp) return;
  if (audio.paused) audio.play().catch(()=>{}); else audio.pause();
}

function updatePlayIcon() {
  const paused = audio.paused;
  document.getElementById('playIconPath').setAttribute('points',
    paused ? '8,5 19,12 8,19' : '6,4 6,20 10,20 10,4 14,4 14,20 18,20 18,4'
  );
}

function skipBack() { audio.currentTime = Math.max(0, audio.currentTime-15); }
function skipForward() { audio.currentTime = Math.min(audio.duration||0, audio.currentTime+30); }

function cycleSpeed() {
  speedIdx = (speedIdx+1)%speeds.length;
  audio.playbackRate = speeds[speedIdx];
  updateSpeedBtn();
  saveSession();
}

function updateSpeedBtn() {
  const s = speeds[speedIdx];
  document.getElementById('speedBtn').textContent = (s%1===0?s.toFixed(1):s)+'×';
}

function seekTo(e) {
  if (!audio.duration) return;
  const r = document.getElementById('progressBar').getBoundingClientRect();
  audio.currentTime = ((e.clientX-r.left)/r.width)*audio.duration;
}

function fmt(s) {
  if (!s||isNaN(s)) return '0:00';
  return Math.floor(s/60)+':'+Math.floor(s%60).toString().padStart(2,'0');
}

audio.addEventListener('timeupdate',()=>{
  if (!audio.duration) return;
  const pct = (audio.currentTime/audio.duration)*100;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('timeEl').textContent = fmt(audio.currentTime);
  document.getElementById('durationEl').textContent = fmt(audio.duration);
  if (currentEp&&audio.duration>0) setProgress(currentEp.id, audio.currentTime/audio.duration);
});

audio.addEventListener('play', updatePlayIcon);
audio.addEventListener('pause', updatePlayIcon);
audio.addEventListener('ended', ()=>{ if(currentEp) setProgress(currentEp.id,1); updatePlayIcon(); });

setInterval(saveSession, 8000);

// ── INIT ─────────────────────────────────────────────────
(function(){
  const cid = localStorage.getItem('gCid');
  const fid = localStorage.getItem('gFid');
  if (cid) document.getElementById('clientIdInput').value = cid;
  if (fid) document.getElementById('folderIdInput').value = fid;

  if (accessToken && fid) {
    // Returned from OAuth redirect with a valid token
    showMain();
    showLoading();
    loadGapiAndFetch(fid);
  } else if (cid && fid) {
    // Had credentials saved, need to re-auth
    showMain();
    showLoading();
    doAuth(cid, fid);
  }
})();
</script>
